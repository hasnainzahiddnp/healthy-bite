<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Bite - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-mode"> 

<nav>
    <h2>Healthy Bite [ADMIN]</h2>
    <a href="index.html">Create Profile</a>
    <a href="plan.html">Meal Plans</a>
    <a href="admin.html">Admin Panel</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
</nav>

<main>
    <section>
        <h3>Dashboard Statistics</h3>
        <div class="stats-container" id="statsContainer">
            
        </div>
    </section>

    <section>
        <h3>Manage Client Profiles</h3>
        
        
        <div id="editSection" style="display: none;" class="card">
            <h4>Edit Profile</h4>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Current Weight (kg)</label>
                    <input type="number" id="editWeight" required>
                </div>
                <button type="submit">Save Changes</button>
                <button type="button" onclick="cancelEdit()" style="background: #7f8c8d;">Cancel</button>
            </form>
        </div>

        <table id="adminTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Current Weight</th>
                    <th>Goal</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                
            </tbody>
        </table>
    </section>
</main>

<script src="admin.js"></script>
<script src="auth.js"></script>
</body>
</html>
