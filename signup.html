<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Bite - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>Healthy Bite</h2>
    <a href="index.html">Create Profile</a>
    <a href="plan.html">Meal Plans</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
</nav>

<main>
    <section>
        <h3>Create Your Account</h3>
        <form id="signupForm" novalidate>
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" required>
                <span class="error-msg" id="nameError">Name is required.</span>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" required>
                <span class="error-msg" id="emailError">Valid email is required.</span>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" required minlength="6">
                <span class="error-msg" id="passwordError">Password must be at least 6 characters.</span>
            </div>
            <button type="submit">Sign Up</button>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </section>
</main>

<script src="auth.js"></script>
</body>
</html>
