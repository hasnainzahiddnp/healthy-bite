<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Bite - Create Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>Healthy Bite</h2>
    <a href="index.html">Create Profile</a>
    <a href="plan.html">Meal Plans</a>
    <a href="admin.html">Admin Panel</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
</nav>

<main>
    <section>
        <h3>Create Your Meal Profile</h3>
        <form id="profileForm" novalidate>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required>
                <span class="error-msg" id="nameError">Name is required.</span>
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" required>
                <span class="error-msg" id="ageError">Please enter a valid age.</span>
            </div>
            <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" required>
                <span class="error-msg" id="heightError">Please enter a valid height.</span>
            </div>
            <div class="form-group">
                <label for="currentWeight">Current Weight (kg)</label>
                <input type="number" id="currentWeight" required>
                <span class="error-msg" id="currentWeightError">Current weight is required.</span>
            </div>
            <div class="form-group">
                <label for="goalWeight">Goal Weight (kg)</label>
                <input type="number" id="goalWeight" required>
                <span class="error-msg" id="goalWeightError">Goal weight is required.</span>
            </div>
            <div class="form-group">
                <label for="cuisine">Preferred Cuisine</label>
                <select id="cuisine" required>
                    <option value="">Select one...</option>
                    <option value="pakistani">Pakistani</option>
                    <option value="continental">Continental</option>
                    <option value="asian">Asian</option>
                </select>
                <span class="error-msg" id="cuisineError">Please select a cuisine.</span>
            </div>
            <button type="submit">Submit Profile</button>
        </form>
    </section>
</main>

<script src="app.js"></script>
<script src="auth.js"></script>
</body>
</html>
